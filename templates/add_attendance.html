<!DOCTYPE html>
<html>

<head>

    <title>Mark Attendance</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

    <h1>Mark Attendance</h1>

    <form method="POST">

        <div class="mb-3">

            <label>Employee</label>

            <select
                name="employee_id"
                class="form-control">

                {% for employee in employees %}

                <option value="{{ employee.id }}">

                    {{ employee.name }}

                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label>Date</label>

            <input
                type="date"
                name="date"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>Status</label>

            <select
                name="status"
                class="form-control">

                <option>Present</option>
                <option>Absent</option>

            </select>

        </div>

        <button class="btn btn-success">

            Save Attendance

        </button>

    </form>

</body>

</html>
