<!DOCTYPE html>
<html>

<head>

    <title>Add Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5 mb-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h2>Add Employee</h2>

        </div>

        <div class="card-body">

            <form method="POST">

                <!-- Personal Information -->

                <h4 class="mb-3">Personal Information</h4>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label>Employee Code</label>
                        <input type="text" name="employee_code" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>First Name</label>
                        <input type="text" name="first_name" class="form-control" required>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Last Name</label>
                        <input type="text" name="last_name" class="form-control" required>
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Father Name</label>
                        <input type="text" name="father_name" class="form-control">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Gender</label>

                        <select name="gender" class="form-control">

                            <option>Male</option>

                            <option>Female</option>

                            <option>Other</option>

                        </select>

                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Date of Birth</label>
                        <input type="date" name="dob" class="form-control">
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Phone</label>
                        <input type="text" name="phone" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control">
                    </div>

                </div>

                <div class="mb-3">

                    <label>Address</label>

                    <textarea name="address" class="form-control"></textarea>

                </div>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label>City</label>
                        <input type="text" name="city" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>State</label>
                        <input type="text" name="state" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Pincode</label>
                        <input type="text" name="pincode" class="form-control">
                    </div>

                </div>

                <hr>

                <h4 class="mb-3">Government Details</h4>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Aadhaar Number</label>
                        <input type="text" name="aadhaar" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>PAN Number</label>
                        <input type="text" name="pan" class="form-control">
                    </div>

                </div>

                <hr>

                <h4 class="mb-3">Bank Details</h4>

                <div class="row">

                    <div class="col-md-4 mb-3">
                        <label>Bank Name</label>
                        <input type="text" name="bank_name" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Account Number</label>
                        <input type="text" name="account_number" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>IFSC Code</label>
                        <input type="text" name="ifsc" class="form-control">
                    </div>

                </div>

                <hr>

                <h4 class="mb-3">Employment Details</h4>

                <div class="row">

                    <div class="col-md-3 mb-3">
                        <label>Department</label>
                        <input type="text" name="department" class="form-control">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Designation</label>
                        <input type="text" name="designation" class="form-control">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Joining Date</label>
                        <input type="date" name="joining_date" class="form-control">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Status</label>

                        <select name="status" class="form-control">

                            <option>Active</option>

                            <option>Inactive</option>

                        </select>

                    </div>

                </div>

                <button class="btn btn-success btn-lg">
                    Save Employee
                </button>

                <a href="/" class="btn btn-secondary btn-lg">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
