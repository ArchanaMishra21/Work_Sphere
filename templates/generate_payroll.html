<!DOCTYPE html>
<html>

<head>

    <title>Generate Payroll</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand" href="/">
            WorkSphere ERP
        </a>

        <a href="/payroll" class="btn btn-light">
            Payroll Dashboard
        </a>

    </div>

</nav>

<div class="container mt-5 mb-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h2>Generate Payroll</h2>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Employee

</label>

<select
name="employee_id"
class="form-select"
required>

<option value="">

Select Employee

</option>

{% for employee in employees %}

<option value="{{ employee.id }}">

{{ employee.employee_code }}
-
{{ employee.first_name }}
{{ employee.last_name }}

</option>

{% endfor %}

</select>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Month</label>

<input
type="text"
name="month"
class="form-control"
placeholder="July"
required>

</div>

<div class="col-md-6 mb-3">

<label>Year</label>

<input
type="number"
name="year"
class="form-control"
placeholder="2026"
required>

</div>

</div>

<hr>

<h4>Deductions</h4>

<div class="row">

<div class="col-md-4 mb-3">

<label>Advance</label>

<input
type="number"
name="advance"
class="form-control"
value="0">

</div>

<div class="col-md-4 mb-3">

<label>PF</label>

<input
type="number"
name="pf"
class="form-control"
value="0">

</div>

<div class="col-md-4 mb-3">

<label>ESI</label>

<input
type="number"
name="esi"
class="form-control"
value="0">

</div>

<div class="col-md-6 mb-3">

<label>Professional Tax</label>

<input
type="number"
name="professional_tax"
class="form-control"
value="0">

</div>

<div class="col-md-6 mb-3">

<label>Other Deduction</label>

<input
type="number"
name="other_deduction"
class="form-control"
value="0">

</div>

</div>

<div class="text-center mt-4">

<button
class="btn btn-success btn-lg">

Generate Payroll

</button>

</div>

</form>

</div>

</div>

</div>

</body>

</html>
