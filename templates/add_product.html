<!DOCTYPE html>
<html>

<head>
    <title>Add Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(to right, #e3f2fd, #ffffff);">

    <div class="container mt-5">

        <h1>Add Product</h1>

        <form method="POST">

            <div class="mb-3">
                <label>Product Name</label>
                <input type="text"
                       name="product_name"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Category</label>
                <input type="text"
                       name="category"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Quantity</label>
                <input type="number"
                       name="quantity"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Price</label>
                <input type="number"
                       name="price"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Supplier</label>
                <input type="text"
                       name="supplier"
                       class="form-control">
            </div>

            <button class="btn btn-primary">
                Add Product
            </button>

        </form>

    </div>

</body>

</html>
