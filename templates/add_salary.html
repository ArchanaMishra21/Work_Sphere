<!DOCTYPE html>
<html>

<head>

    <title>Add Salary Structure</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand" href="/">
            WorkSphere ERP
        </a>

        <div>

            <a href="/" class="btn btn-light me-2">
                Home
            </a>

            <a href="/salary" class="btn btn-light">
                Salary Structure
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5 mb-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h2>Add Salary Structure</h2>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">Employee</label>

                    <select
                        name="employee_id"
                        class="form-select"
                        required>

                        <option value="">Select Employee</option>

                        {% for employee in employees %}

                        <option value="{{ employee.id }}">

                            {{ employee.employee_code }}
                            -
                            {{ employee.first_name }}
                            {{ employee.last_name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <hr>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Basic Salary</label>

                        <input
                            type="number"
                            name="basic"
                            class="form-control"
                            value="0">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>HRA</label>

                        <input
                            type="number"
                            name="hra"
                            class="form-control"
                            value="0">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Fuel Allowance</label>

                        <input
                            type="number"
                            name="fuel_allowance"
                            class="form-control"
                            value="0">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Medical Allowance</label>

                        <input
                            type="number"
                            name="medical_allowance"
                            class="form-control"
                            value="0">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Travel Allowance</label>

                        <input
                            type="number"
                            name="travel_allowance"
                            class="form-control"
                            value="0">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Overtime</label>

                        <input
                            type="number"
                            name="overtime"
                            class="form-control"
                            value="0">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Bonus</label>

                        <input
                            type="number"
                            name="bonus"
                            class="form-control"
                            value="0">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Other Allowance</label>

                        <input
                            type="number"
                            name="other_allowance"
                            class="form-control"
                            value="0">

                    </div>

                </div>

                <div class="text-center mt-4">

                    <button
                        type="submit"
                        class="btn btn-success btn-lg">

                        Save Salary Structure

                    </button>

                    <a
                        href="/salary"
                        class="btn btn-secondary btn-lg">

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>

</html>
