<!DOCTYPE html>
<html>

<head>
    <title>Edit Product</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1>Edit Product</h1>

    <form method="POST">

        <div class="mb-3">
            <label>Product Name</label>
            <input
                type="text"
                name="product_name"
                value="{{ product.name }}"
                class="form-control">
        </div>

        <div class="mb-3">
            <label>Category</label>
            <input
                type="text"
                name="category"
                value="{{ product.category }}"
                class="form-control">
        </div>

        <div class="mb-3">
            <label>Quantity</label>
            <input
                type="number"
                name="quantity"
                value="{{ product.quantity }}"
                class="form-control">
        </div>

        <div class="mb-3">
            <label>Price</label>
            <input
                type="number"
                name="price"
                value="{{ product.price }}"
                class="form-control">
        </div>

        <div class="mb-3">
            <label>Supplier</label>
            <input
                type="text"
                name="supplier"
                value="{{ product.supplier }}"
                class="form-control">
        </div>

        <button class="btn btn-success">
            Update Product
        </button>

        <a href="/products" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

</body>

</html>
