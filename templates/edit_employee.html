<!DOCTYPE html>
<html>

<head>
    <title>Edit Employee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h1>Edit Employee</h1>

        <form method="POST">

            <div class="mb-3">
                <label>Name</label>
                <input
                    type="text"
                    name="employee_name"
                    value="{{ employee.name }}"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Department</label>
                <input
                    type="text"
                    name="department"
                    value="{{ employee.department }}"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Salary</label>
                <input
                    type="number"
                    name="salary"
                    value="{{ employee.salary }}"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    value="{{ employee.email }}"
                    class="form-control">
            </div>

            <button class="btn btn-success">
                Update Employee
            </button>

            <a href="/employees" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</body>

</html>
